# Intended GitHub Actions workflow.
# Copy to .github/workflows/research.yml after the GitHub automation token has workflow-file permission.
name: Research 300+ GitHub crypto trading bot repos

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Number of repositories to evaluate
        required: false
        default: '350'
      include_owner_repos:
        description: Include likely matching repositories owned by this GitHub account
        required: false
        default: 'true'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run scanner
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          FLAG=""
          if [ "${{ inputs.include_owner_repos }}" = "true" ]; then FLAG="--include-owner-repos"; fi
          python -m crypto_regime_guard.cli scan-repos --limit "${{ inputs.limit }}" --output artifacts/repo-evaluation.csv --markdown artifacts/repo-evaluation.md $FLAG
      - name: Upload research artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-research-report
          path: artifacts/repo-evaluation.*
