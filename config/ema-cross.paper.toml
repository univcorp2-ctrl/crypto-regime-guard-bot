[bot]
mode = "paper"
exchange_id = "binance"
symbol = "BTC/USDT"
timeframe = "1h"
strategy = "ema_cross"
candle_limit = 200
quote_order_size = 25.0
poll_seconds = 60
enable_live_trading = false
data_path = "data/sample_btc_usdt_1h.csv"
paper_initial_quote = 1000.0
state_path = "state/ema_cross_paper_state.json"
trade_log_path = "logs/ema_cross_trades.csv"

[risk]
min_quote_order = 10.0
max_single_trade_quote = 50.0
max_risk_score = 85.0
allow_live_market_orders = true

[strategy_params]
fast_ema = 12
slow_ema = 48
target_position = 1.0
